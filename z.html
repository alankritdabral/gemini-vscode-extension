<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        background-color: var(--vscode-editor-background);
        color: var(--vscode-editor-foreground);
        font-family: var(--vscode-font-family);
        overflow: hidden;
      }
      #chat-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100%;
        position: relative;
      }
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
      }
      .message {
        padding: 10px 14px;
        border-radius: 6px;
        max-width: 85%;
        word-wrap: break-word;
        white-space: pre-wrap;
        font-size: var(--vscode-font-size);
      }
      .user-message {
        align-self: flex-end;
        background-color: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
      }
      .assistant-message {
        align-self: flex-start;
        background-color: var(--vscode-editorWidget-background);
        border: 1px solid var(--vscode-widget-border);
        color: var(--vscode-editorWidget-foreground);
      }
      .assistant-message.thinking {
        font-style: italic;
        opacity: 0.6;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0% {
          opacity: 0.3;
        }
        50% {
          opacity: 0.7;
        }
        100% {
          opacity: 0.3;
        }
      }
      #input-container {
        padding: 12px;
        border-top: 1px solid var(--vscode-widget-border);
        display: flex;
        flex-direction: column;
        gap: 10px;
        background-color: var(--vscode-editor-background);
      }
      #prompt {
        width: 100%;
        min-height: 70px;
        padding: 8px;
        background-color: var(--vscode-input-background);
        color: var(--vscode-input-foreground);
        border: 1px solid var(--vscode-input-border);
        resize: none;
        box-sizing: border-box;
      }
      #controls {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      button {
        padding: 6px 14px;
        background-color: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border: none;
        cursor: pointer;
        border-radius: 2px;
      }
      button:hover {
        background-color: var(--vscode-button-hoverBackground);
      }
      #status-bar {
        font-size: 10px;
        opacity: 0.7;
        padding: 4px 12px;
        border-top: 1px solid var(--vscode-widget-border);
        background: var(--vscode-sideBar-background);
      }
    </style>
  </head>
  <body>
    <div id="chat-container">
      <div id="messages"></div>

      <div id="input-container">
        <textarea id="prompt"></textarea>
        <div id="controls">
          <button id="clear-btn">Clear</button>
          <button id="send-btn">Send</button>
        </div>
      </div>

      <div id="status-bar">Ready</div>
    </div>

    <script>
      (function () {
        const vscode = acquireVsCodeApi();
        const msgContainer = document.getElementById("messages");
        const input = document.getElementById("prompt");
        const status = document.getElementById("status-bar");
        let messages = [];
        let currentMsg = null;
        let thinking = null;

        function add(text, type, skipSave = false) {
          const div = document.createElement("div");
          div.className = "message " + type + "-message";
          div.textContent = text;
          msgContainer.appendChild(div);
          msgContainer.scrollTop = msgContainer.scrollHeight;

          if (!skipSave && type !== "thinking") {
            messages.push({ text, type });
            vscode.postMessage({
              command: "updateHistory",
              messages: messages,
            });
          }
          return div;
        }

        function handleSend() {
          const text = input.value.trim();
          if (!text) return;
          add(text, "user");
          thinking = add("Gemini is thinking...", "assistant", true);
          thinking.classList.add("thinking");
          vscode.postMessage({ command: "sendMessage", text: text });
          input.value = "";
          currentMsg = null;
        }

        document.getElementById("send-btn").onclick = handleSend;
        input.onkeydown = (e) => {
          if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) handleSend();
        };
        document.getElementById("clear-btn").onclick = () => {
          msgContainer.innerHTML = "";
          messages = [];
          vscode.postMessage({ command: "clearChat" });
        };

        window.addEventListener("message", (event) => {
          const m = event.data;

          if (m.command === "loadHistory") {
            msgContainer.innerHTML = "";
            messages = m.messages || [];
            messages.forEach((msg) => add(msg.text, msg.type, true));
            return;
          }

          if (thinking) {
            thinking.remove();
            thinking = null;
          }

          if (m.command === "receiveMessage") {
            if (m.text.startsWith("[Tool")) {
              add(m.text, "assistant");
              currentMsg = null;
            } else {
              if (!currentMsg) {
                currentMsg = add(m.text, "assistant");
              } else {
                currentMsg.textContent += m.text;
                // Update the last message in history
                const lastMsg = messages[messages.length - 1];
                if (lastMsg && lastMsg.type === "assistant") {
                  lastMsg.text = currentMsg.textContent;
                  vscode.postMessage({
                    command: "updateHistory",
                    messages: messages,
                  });
                }
                msgContainer.scrollTop = msgContainer.scrollHeight;
              }
            }
          } else if (m.command === "receiveError") {
            add("Error: " + m.text, "assistant");
          } else if (m.command === "processExit") {
            currentMsg = null;
          }
        });
      })();
    </script>
  </body>
</html>
